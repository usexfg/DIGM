name: Rust

on:
  push:
    paths:
      - 'libfuego_core/**'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'libfuego_core/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate:
          - fuego-crypto
          - fuego-vault
          - i2p-net
          - p2p-net
          - chunk-store
          - digm-app
          - fuego-node
          - fuego-audio
          - ffi-bridge
    defaults:
      run:
        working-directory: libfuego_core
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: libfuego_core

      - name: Check ${{ matrix.crate }}
        run: cargo check -p ${{ matrix.crate }}

      - name: Test ${{ matrix.crate }}
        run: cargo test -p ${{ matrix.crate }} --no-fail-fast
