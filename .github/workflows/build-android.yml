name: Build Android App

on:
  push:
    branches: [ main, develop, originsapp ]
    paths:
      - 'device-proof-recorder-android/**'
  pull_request:
    branches: [ main, develop, originsapp ]
    paths:
      - 'device-proof-recorder-android/**'

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
        working-directory: device-proof-recorder-android
      
      - name: Install Fastlane
        working-directory: device-proof-recorder-android
        run: |
          bundle install
      
      - name: Grant execute permission for gradlew
        working-directory: device-proof-recorder-android
        run: |
          chmod +x gradlew
      
      - name: Build Android App
        working-directory: device-proof-recorder-android
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          CI: 'true'
        run: |
          bundle exec fastlane ci
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v3
        with:
          name: android-debug-apk
          path: |
            device-proof-recorder-android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: ignore
      
      - name: Upload Release AAB
        uses: actions/upload-artifact@v3
        with:
          name: android-release-aab
          path: |
            device-proof-recorder-android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: ignore

  test-android:
    name: Test Android App
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        working-directory: device-proof-recorder-android
        run: |
          chmod +x gradlew
      
      - name: Run tests
        working-directory: device-proof-recorder-android
        run: |
          ./gradlew test --no-daemon

