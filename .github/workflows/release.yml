name: Release Build

on:
  release:
    types: [ created ]

jobs:
  release-rust:
    name: Release Rust Library
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build Release
        run: |
          cd digm_ref
          cargo build --release
          
      - name: Build CLI Tools
        run: |
          cd digm_ref
          cargo build --release --bin digm-encode
          cargo build --release --bin digm-info
          
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            digm_ref/target/release/libdigm_ref.*
            digm_ref/target/release/digm-encode*
            digm_ref/target/release/digm-info*
          token: ${{ secrets.GITHUB_TOKEN }}

  release-ios:
    name: Release iOS App
    runs-on: macos-14
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'
          
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Install Fastlane
        run: |
          cd device-proof-recorder-ios
          bundle install
          
      - name: Setup App Store Connect API Key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_API_PRIVATE_KEY }}
        run: |
          cd device-proof-recorder-ios
          echo "API key configured via environment variables"
          
      - name: Build and Submit to App Store (via Fastlane release)
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_API_PRIVATE_KEY }}
          FASTLANE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          cd device-proof-recorder-ios
          bundle exec fastlane release
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ios-release
          path: |
            device-proof-recorder-ios/build/*.ipa
            device-proof-recorder-ios/build/*.xcarchive
          retention-days: 30
          if-no-files-found: ignore

