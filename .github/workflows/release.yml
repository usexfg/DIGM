name: Release Build

on:
  release:
    types: [ created ]

jobs:
  release-rust:
    name: Release Rust Library
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build Release
        working-directory: digm_ref
        run: |
          cargo build --release
          
      - name: Build CLI Tools
        working-directory: digm_ref
        run: |
          cargo build --release --bin digm-encode
          cargo build --release --bin digm-info
          
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            digm_ref/target/release/libdigm_ref.*
            digm_ref/target/release/digm-encode*
            digm_ref/target/re ولیlease/digm-info*
          token: ${{ secrets.GITHUB_TOKEN }}

  release-ios:
    name: Release iOS App
    runs-on: macos-14
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'
          
      - name: Build and Archive
        working-directory: device-proof-recorder-ios
        run: |
          # Build iOS app for release
          echo "iOS release build placeholder"
          
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: device-proof-recorder-ios/build/DIGMVoiceMemo.xcarchive
          issuer-id: ${{ secrets.APP_STORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_API_PRIVATE_KEY }}
          if-no-files-found: ignore

