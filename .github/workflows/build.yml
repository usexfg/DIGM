name: Build DIGM Platform

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-rust:
    name: Build Rust Library
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Build Rust Library
        working-directory: digm_ref
        run: |
          cargo build --release
          
      - name: Run Rust Tests
        working-directory: digm_ref
        run: |
          cargo test
          
      - name: Build CLI Tools
        working-directory: digm_ref
        run: |
          cargo build --release --bin digm-encode
          cargo build --release --bin digm-info
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: rust-library
          path: |
            digm_ref/target/release/libdigm_ref.*
            digm_ref/target/release/digm-encode
            digm_ref/target/release/digm-info
          retention-days: 7

  build-ios:
    name: Build iOS App
    runs-on: macos-14
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer
          xcodebuild -version
          
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'
          
      - name: Cache Swift
        uses: actions/cache@v3
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swift-${{ hashFiles('device-proof-recorder-ios/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
        working-directory: device-proof-recorder-ios
      
      - name: Install Fastlane
        working-directory: device-proof-recorder-ios
        run: |
          bundle install
          
      - name: Build iOS App
        working-directory: device-proof-recorder-ios
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          CI: 'true'
        run: |
          bundle exec fastlane ci
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ios-app
          path: device-proof-recorder-ios/build/
          retention-days: 7
          if-no-files-found: ignore

  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Run Rust Clippy
        working-directory: digm_ref
        run: |
          cargo clippy -- -D warnings
          
      - name: Check Rust Format
        working-directory: digm_ref
        run: |
          cargo fmt --all -- --check

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Run All Tests
        working-directory: digm_ref
        run: |
          cargo test --verbose
          
      - name: Run Roundtrip Test
        working-directory: digm_ref
        run: |
          cargo test test_roundtrip --verbose

