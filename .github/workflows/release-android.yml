name: Release Android App

on:
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  release-android:
    name: Release Android App
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
        working-directory: device-proof-recorder-android
      
      - name: Install Fastlane
        working-directory: device-proof-recorder-android
        run: |
          bundle install
      
      - name: Setup Google Play API
        working-directory: device-proof-recorder-android
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > fastlane/google_play_api_key.json
          fi
      
      - name: Build and Upload to Google Play
        working-directory: device-proof-recorder-android
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          bundle exec fastlane beta
      
      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: android-release
          path: |
            device-proof-recorder-android/app/build/outputs/bundle/release/*.aab
            device-proof-recorder-android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: ignore
      
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            device-proof-recorder-android/app/build/outputs/bundle/release/*.aab
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

