name: CI

on:
  push:
    branches: [ main, develop, platform ]
  pull_request:
    branches: [ main, develop, platform ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust | ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - fuego-crypto
          - fuego-vault
          - i2p-net
          - p2p-net
          - chunk-store
          - digm-app
          - fuego-node
          - fuego-audio
          - ffi-bridge
    defaults:
      run:
        working-directory: libfuego_core
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: libfuego_core

      - run: cargo check -p ${{ matrix.crate }}

      - run: cargo test -p ${{ matrix.crate }} --no-fail-fast

      - run: cargo clippy -p ${{ matrix.crate }} -- -D warnings

  rust-format:
    name: Rust | Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libfuego_core
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.x

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

  frontend:
    name: Frontend (Web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build

  renderer:
    name: Renderer (Electron)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: renderer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: renderer/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build
